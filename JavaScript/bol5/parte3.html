<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<h1>Actividades JavaScript</h1>

<!--1-->
<h2>1. Nombre y Edad</h2>
<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellidos" placeholder="Apellidos">

<button onclick="actividad1()">Enviar</button>
<div id="res1"></div>

<!-- 2 -->
<h2>2. Divisible por 2</h2>
<input type="number" id="num2" placeholder="Número 1-30">
<button onclick="actividad2()">Comprobar</button>
<div id="res2" class="negro"></div>

<!-- 3 -->
<h2>3. Estaciones Array</h2>
<input type="number" id="num3" placeholder="Número 1-4">
<button onclick="actividad3()">Mostrar</button>
<div id="res3"></div>

<!-- 4 -->
<h2>4. Mes (Switch)</h2>
<input type="text" id="mes4" placeholder="Mes">
<button onclick="actividad4()">Mostrar</button>
<div id="res4" class="rojo"></div>

<!-- 5 -->
<h2>5. Mes (If)</h2>
<input type="text" id="mes5" placeholder="Mes">
<button onclick="actividad5()">Mostrar</button>

<!-- 6 -->

<input type="text" id="nombre6" placeholder="Nombre">
